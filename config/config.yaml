# config.yaml
app:
  name: vivarium-monitor
  env: local
  log_level: INFO

logging:
  format: json                   # json | text
  sink: stdout                   # stdout | file | loki
  file_path: ./logs/vivarium.log
  loki_url: null
  rotate_mb: 10
  retain_days: 7

pipeline:
  stages:
    - preprocessor
    - detector
    - gate
    - measurers
    - aggregator
    - threshold_engine
    - notifier
    - storage

targets:
  enabled:
    - water
    - food
    - mouse

input:
  source: api_upload             # api_upload | webhook | folder_watch
  folder_watch_path: ./incoming
  folder_watch_interval_seconds: 30
  webhook_secret: null
  max_image_size_mb: 10
  allowed_formats: [jpg, jpeg, png, webp]

preprocessor:
  resize_to: [640, 640]
  blur_threshold: 80
  normalize: true
  save_preprocessed: false

# ---------------------------------------------------------------------------
# Detector
# ---------------------------------------------------------------------------
# engine options:
#   yolov8world  — open-vocab, ultralytics YOLOWorld   (requires: ultralytics)
#   groundingdino — open-vocab, IDEA-Research DINO     (requires: groundingdino)
#   owlvit       — open-vocab, Google OWL-ViT/OWLv2   (requires: transformers torch)
#   yolov8       — closed-vocab, standard YOLOv8       (requires: ultralytics)
#                  needs class_map under yolov8 block below
# ---------------------------------------------------------------------------
detector:
  engine: yolov8world            # yolov8world | groundingdino | owlvit | yolov8
  model_path: ./models/weights/yolov8x-world.pt
  device: cpu                    # cpu | cuda | mps
  min_confidence: 0.45
  prompts:
    water: "clear glass jar with water inside sitting on wire rack"
    food:  "small ceramic bowl with food pellets on wire rack"
    mouse: "small rodent mouse animal"

  # ---- YOLOv8 (closed-vocabulary) config ---------------------------------
  # Only read when engine: yolov8
  yolov8:
    class_map:
      water: 0
      food: 1
      mouse: 2
    nms_iou: 0.45
    agnostic_nms: true

  # ---- OWL-ViT (open-vocabulary, transformer-based) config ---------------
  # Only read when engine: owlvit
  owlvit:
    score_threshold: 0.10
    nms_iou: 0.30
    nms_per_target: true

gate:
  enabled: true
  min_box_aspect_ratio: 0.3
  min_visible_area_ratio: 0.02
  max_edge_proximity_ratio: 0.02

# ---------------------------------------------------------------------------
# Water
# Labels written for angled-overhead camera view of a clear glass jar
# sitting on a wire rack — water level visible through the glass side wall.
# ---------------------------------------------------------------------------
water:
  engine: clip                   # clip | opencv | classifier
  model_path: null
  clip_model: ViT-B/32
  min_measurement_confidence: 0.45   # lowered from 0.65 — glass jars are hard for CLIP
  clip_labels:
    - "clear glass jar completely full of water, liquid reaches the top"
    - "clear glass jar three quarters full of water"
    - "clear glass jar half full of water, air gap visible above water line"
    - "clear glass jar one quarter full of water, mostly air inside"
    - "clear glass jar empty, no water inside"
  level_map:
    0: 100
    1: 75
    2: 50
    3: 25
    4: 0
  opencv:
    edge_method: canny
    canny_threshold1: 50
    canny_threshold2: 150
    enable_horizontal_line_detection: true
    horizontal_threshold_px: 10

# ---------------------------------------------------------------------------
# Food
# Labels written for angled-overhead camera view of a small ceramic bowl
# sitting on a wire rack, containing brown/tan rodent food pellets.
# ---------------------------------------------------------------------------
food:
  engine: clip                   # clip | opencv | opencv_food | classifier
  model_path: null
  clip_model: ViT-B/32
  min_measurement_confidence: 0.45   # lowered from 0.65
  clip_labels:
  - "bowl full of food"
  - "bowl with some food"
  - "bowl with little food"
  - "empty bowl"
  level_map:
    0: 100
    1: 50
    2: 25
    3: 0
  opencv_food:
    pellet_h_low: 5
    pellet_h_high: 30
    pellet_s_low: 30
    pellet_s_high: 255
    pellet_v_low: 20
    pellet_v_high: 180
    debug: false

# ---------------------------------------------------------------------------
# Mouse
# Binary presence detection — CLIP works well for this.
# ---------------------------------------------------------------------------
mouse:
  engine: clip                   # clip | classifier
  model_path: null
  clip_model: ViT-B/32
  clip_labels:
    - "mouse visible in the cage"
    - "no mouse visible in the cage"
  presence_map:
    0: true
    1: false
  min_consecutive_absent: 3
  min_measurement_confidence: 0.45

thresholds:
  water_low_pct: 25
  food_low_pct: 20
  mouse_missing_minutes: 60
  confidence_min: 0.70

notifiers:
  enabled:
    - telegram
  cooldown_minutes: 30
  require_consecutive_alerts: 2
  voting_window_minutes: 5
  templates:
    water_low: "Water level is at {value}% — below {threshold}%. Please refill."
    food_low: "Food level is at {value}% — below {threshold}%. Please top up."
    mouse_missing: "Mouse not seen for {minutes} minutes. Please check the vivarium."
    image_rejected: "Image rejected — {reason}. Please send a clearer photo."
  telegram:
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
    parse_mode: Markdown
  email:
    smtp_host: smtp.gmail.com
    smtp_port: 587
    use_tls: true
    from: alerts@yourdomain.com
    to: client@example.com
    subject_prefix: "[Vivarium]"
  webhook:
    url: null
    secret: null
    method: POST
    timeout_seconds: 5

storage:
  engine: postgres
  image_store: local             # local | s3 | gcs
  local_image_path: ./data/images
  s3:
    bucket: null
    region: null
    prefix: vivarium/images/
  gcs:
    bucket: null
    prefix: vivarium/images/
  postgres:
    host: ${POSTGRES_HOST:-localhost}
    port: ${POSTGRES_PORT:-5432}
    db: ${POSTGRES_DB:-vivarium}
    user: ${POSTGRES_USER:-vivarium_user}
    password: ${POSTGRES_PASSWORD}
    schema: public
    pool_size: 5
    pool_timeout_seconds: 30

api:
  host: 0.0.0.0
  port: 8000
  api_key: ${API_KEY}
  rate_limit_per_minute: 30
  cors_origins:
    - "*"
  response_include_image_path: false